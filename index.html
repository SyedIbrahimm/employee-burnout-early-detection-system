<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Wellness System</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Space Grotesk', sans-serif;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
            }

            50% {
                box-shadow: 0 0 40px rgba(239, 68, 68, 0.6);
            }
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes count-up {
            from {
                opacity: 0;
                transform: scale(0.5);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes bonus-pop {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .animate-slide-in {
            animation: slide-in 0.5s ease-out forwards;
        }

        .animate-count {
            animation: count-up 0.3s ease-out forwards;
        }

        .animate-bonus-pop {
            animation: bonus-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .critical-pulse {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .risk-bar {
            background: linear-gradient(90deg, #22c55e 0%, #eab308 50%, #ef4444 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

        <main class="max-w-7xl mx-auto px-4 py-6">

                    <!-- Healthy Employees Benefits -->

    <script>

            dashboard_title: 'Employee Wellness System'

        // Employee data with wellness bonuses and increments
        const employees = [{

                lateSubmissions: 5,
                absences: 4,
                avgHours: 10,

            {

                name: 'Anna Martinez',
                dept: 'Marketing',
                lateSubmissions: 0,
                absences: 1,
                avgHours: 8,
                overtime: 1,
                complaints: 0,
                taskRate: 97,
                salary: 74000
            },
            {
                id: 8,
                name: 'Robert Taylor',
                dept: 'Finance',
                lateSubmissions: 7,
                absences: 5,
                avgHours: 11,
                overtime: 12,
                complaints: 2,
                taskRate: 70,
                salary: 79000
            },
            {
                id: 9,
                name: 'Michelle Lee',
                dept: 'Sales',
                lateSubmissions: 4,
                absences: 3,
                avgHours: 9,
                overtime: 6,
                complaints: 1,
                taskRate: 82,
                salary: 76000
            },
            {
                id: 10,
                name: 'Kevin Brown',
                dept: 'Engineering',
                lateSubmissions: 15,
                absences: 8,
                avgHours: 13,
                overtime: 25,
                complaints: 3,
                taskRate: 52,
                salary: 80000
            }
        ];

        function calculateBurnoutScore(emp) {
            const weights = {
                lateSubmissions: 0.18,
                absences: 0.20,
                avgHours: 0.15,
                overtime: 0.25,
                complaints: 0.12,
                taskRate: 0.10
            };
            const lateScore = Math.min(emp.lateSubmissions / 15, 1) * weights.lateSubmissions;
            const absenceScore = Math.min(emp.absences / 10, 1) * weights.absences;
            const hoursScore = Math.max(0, (emp.avgHours - 8) / 6) * weights.avgHours;
            const overtimeScore = Math.min(emp.overtime / 25, 1) * weights.overtime;
            const complaintScore = Math.min(emp.complaints / 5, 1) * weights.complaints;
            const taskScore = (1 - emp.taskRate / 100) * weights.taskRate;
            return Math.round(Math.min((lateScore + absenceScore + hoursScore + overtimeScore + complaintScore + taskScore) * 100, 100));
        }

        function getStatus(score) {
            if (score >= 70) return {
                label: 'Critical',
                color: 'red',
                bg: 'bg-red-500/20',
                text: 'text-red-400'
            };
            if (score >= 40) return {
                label: 'At Risk',
                color: 'amber',
                bg: 'bg-amber-500/20',
                text: 'text-amber-400'
            };
            return {
                label: 'Healthy',
                color: 'emerald',
                bg: 'bg-emerald-500/20',
                text: 'text-emerald-400'
            };
        }

        function calculateBonusAndIncrement(emp, burnoutScore) {
            if (burnoutScore <= 30) {
                return {
                    bonus: 15,
                    increment: 8
                };
            } else if (burnoutScore <= 40) {
                return {
                    bonus: 10,
                    increment: 5
                };
            }
            return {
                bonus: 0,
                increment: 0
            };
        }

        // Initialize employees with scores and bonuses
        employees.forEach(emp => {
            emp.burnoutScore = calculateBurnoutScore(emp);
            emp.status = getStatus(emp.burnoutScore);
            const rewards = calculateBonusAndIncrement(emp, emp.burnoutScore);
            emp.bonus = rewards.bonus;
            emp.increment = rewards.increment;
        });

        let currentFilter = 'all';

        function renderStats() {
            const stats = {
                total: employees.length,
                healthy: employees.filter(e => e.status.label === 'Healthy').length,
                atRisk: employees.filter(e => e.status.label === 'At Risk').length,
                critical: employees.filter(e => e.status.label === 'Critical').length,
                bonuses: employees.filter(e => e.bonus > 0).length
            };
            animateNumber('stat-total', stats.total);
            animateNumber('stat-healthy', stats.healthy);
            animateNumber('stat-risk', stats.atRisk);
            animateNumber('stat-critical', stats.critical);
            animateNumber('stat-bonuses', stats.bonuses);
        }

        function animateNumber(id, target) {
            const el = document.getElementById(id);
            let current = 0;
            const increment = target / 20;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    el.textContent = target;
                    clearInterval(timer);
                } else {
                    el.textContent = Math.floor(current);
                }
            }, 30);
        }

        function renderEmployeeTable(filter = 'all') {
            const tbody = document.getElementById('employee-table');
            let filtered = [...employees];

            if (filter === 'critical') filtered = employees.filter(e => e.status.label === 'Critical');
            else if (filter === 'healthy') filtered = employees.filter(e => e.status.label === 'Healthy');

            filtered.sort((a, b) => a.burnoutScore - b.burnoutScore);

            tbody.innerHTML = filtered.map(emp => `
                <tr class="hover:bg-slate-800/30 transition-colors">
                    <td class="py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center text-white font-medium text-sm">
                                ${emp.name.split(' ').map(n => n[0]).join('')}
                            </div>
                            <div>
                                <p class="font-medium text-white">${emp.name}</p>
                                <p class="text-xs text-slate-400">EMP-${String(emp.id).padStart(4, '0')}</p>
                            </div>
                        </div>
                    </td>
                    <td class="py-4"><span class="px-3 py-1 rounded-lg text-sm bg-slate-700/50 text-slate-300">${emp.dept}</span></td>
                    <td class="py-4">
                        <div class="flex items-center gap-2">
                            <div class="w-16 h-2 bg-slate-700 rounded-full overflow-hidden">
                                <div class="h-full risk-bar" style="width: ${emp.burnoutScore}%"></div>
                            </div>
                            <span class="mono text-sm ${emp.status.text}">${emp.burnoutScore}%</span>
                        </div>
                    </td>
                    <td class="py-4"><span class="px-3 py-1.5 rounded-full text-xs font-medium ${emp.status.bg} ${emp.status.text}">${emp.status.label}</span></td>
                    <td class="py-4">
                        <div class="flex flex-col gap-1">
                            ${emp.bonus > 0 ? `<span class="text-xs font-medium bg-emerald-500/20 text-emerald-300 px-2 py-1 rounded animate-bonus-pop">💰 ${emp.bonus}% Bonus</span>` : '<span class="text-xs text-slate-500">—</span>'}
                            ${emp.increment > 0 ? `<span class="text-xs font-medium bg-blue-500/20 text-blue-300 px-2 py-1 rounded animate-bonus-pop">📈 ${emp.increment}% Increment</span>` : ''}
                        </div>
                    </td>
                    <td class="py-4"><button onclick="showEmployeeDetail(${emp.id})" class="px-3 py-1.5 rounded-lg text-sm bg-violet-500/20 text-violet-300 hover:bg-violet-500/30 transition-colors">View</button></td>
                </tr>
            `).join('');
        }

        function renderHealthyEmployees() {
            const healthy = employees.filter(e => e.status.label === 'Healthy').sort((a, b) => a.burnoutScore - b.burnoutScore);
            const list = document.getElementById('healthy-list');

            list.innerHTML = healthy.map(emp => `
                <div class="bg-slate-800/50 rounded-lg p-3 border border-emerald-500/20">
                    <div class="flex items-center justify-between mb-2">
                        <p class="font-medium text-emerald-300">${emp.name}</p>
                        <span class="text-xs text-emerald-400">✓ Healthy</span>
                    </div>
                    <div class="flex justify-between text-xs text-slate-400 mb-2">
                        <span>${emp.dept}</span>
                        <span>${emp.burnoutScore}% Score</span>
                    </div>
                    <div class="flex gap-2">
                        ${emp.bonus > 0 ? `<span class="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded flex-1 text-center">💰 ${emp.bonus}% Bonus</span>` : ''}
                        ${emp.increment > 0 ? `<span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-1 rounded flex-1 text-center">📈 ${emp.increment}% Inc</span>` : ''}
                    </div>
                </div>
            `).join('');

            if (healthy.length === 0) {
                list.innerHTML = '<p class="text-sm text-slate-400 text-center py-8">No healthy employees at the moment</p>';
            }
        }

        function renderAlerts() {
            const critical = employees.filter(e => e.status.label === 'Critical' || e.status.label === 'At Risk')
                .sort((a, b) => b.burnoutScore - a.burnoutScore)
                .slice(0, 5);

            const alertsList = document.getElementById('alerts-list');
            alertsList.innerHTML = critical.map(emp => `
                <div class="flex items-start gap-3 p-3 rounded-lg ${emp.status.label === 'Critical' ? 'bg-red-500/10 border border-red-500/20' : 'bg-amber-500/10 border border-amber-500/20'}">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${emp.status.bg}">
                        <svg class="w-4 h-4 ${emp.status.text}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-white">${emp.name}</p>
                        <p class="text-xs text-slate-400">${emp.status.label} - ${emp.burnoutScore}% score</p>
                    </div>
                </div>
            `).join('');
        }

        function showEmployeeDetail(id) {
            const emp = employees.find(e => e.id === id);
            if (!emp) return;

            const modal = document.getElementById('employee-modal');
            const content = document.getElementById('modal-content');
            const newSalary = Math.round(emp.salary * (1 + emp.increment / 100));
            const bonusAmount = Math.round(emp.salary * emp.bonus / 100);

            content.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl">
                            ${emp.name.split(' ').map(n => n[0]).join('')}
                        </div>
                        <div>
                            <h3 class="text-2xl font-bold text-white">${emp.name}</h3>
                            <p class="text-slate-400">${emp.dept} • EMP-${String(emp.id).padStart(4, '0')}</p>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="w-10 h-10 rounded-lg bg-slate-700/50 flex items-center justify-center text-slate-400 hover:text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <div class="bg-slate-900/50 rounded-xl p-5 mb-4">
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-slate-300">Burnout Risk Score</span>
                        <span class="px-3 py-1 rounded-full text-sm font-medium ${emp.status.bg} ${emp.status.text}">${emp.status.label}</span>
                    </div>
                    <div class="h-4 bg-slate-700 rounded-full overflow-hidden">
                        <div class="h-full risk-bar" style="width: ${emp.burnoutScore}%"></div>
                    </div>
                    <p class="text-3xl font-bold mono ${emp.status.text} mt-2">${emp.burnoutScore}%</p>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-900/50 rounded-lg p-3">
                        <p class="text-2xl font-bold text-white mono">${emp.lateSubmissions}</p>
                        <p class="text-xs text-slate-400 mt-1">Late Submissions</p>
                    </div>
                    <div class="bg-slate-900/50 rounded-lg p-3">
                        <p class="text-2xl font-bold text-white mono">${emp.absences}</p>
                        <p class="text-xs text-slate-400 mt-1">Absences</p>
                    </div>
                    <div class="bg-slate-900/50 rounded-lg p-3">
                        <p class="text-2xl font-bold text-white mono">${emp.taskRate}%</p>
                        <p class="text-xs text-slate-400 mt-1">Task Completion</p>
                    </div>
                    <div class="bg-slate-900/50 rounded-lg p-3">
                        <p class="text-2xl font-bold text-white mono">${emp.overtime}h</p>
                        <p class="text-xs text-slate-400 mt-1">Overtime/Month</p>
                    </div>
                </div>

                ${emp.bonus > 0 || emp.increment > 0 ? `
                    <div class="bg-gradient-to-r from-emerald-500/20 to-blue-500/20 border border-emerald-500/30 rounded-xl p-4 mb-4">
                        <h4 class="text-sm font-semibold text-emerald-300 mb-3">🎉 Wellness Rewards</h4>
                        <div class="space-y-2">
                            ${emp.bonus > 0 ? `
                                <div class="flex items-center justify-between p-2 bg-slate-900/50 rounded-lg">
                                    <span class="text-sm text-slate-300">Annual Bonus (${emp.bonus}%)</span>
                                    <span class="font-bold text-emerald-400">$${bonusAmount.toLocaleString()}</span>
                                </div>
                            ` : ''}
                            ${emp.increment > 0 ? `
                                <div class="flex items-center justify-between p-2 bg-slate-900/50 rounded-lg">
                                    <span class="text-sm text-slate-300">Salary Increment (${emp.increment}%)</span>
                                    <span class="font-bold text-blue-400">$${newSalary.toLocaleString()}/yr</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                ` : ''}

                <div class="bg-violet-500/10 border border-violet-500/20 rounded-xl p-4">
                    <h4 class="text-sm font-semibold text-violet-300 mb-2">💡 Recommendation</h4>
                    <p class="text-sm text-slate-300">
                        ${emp.burnoutScore >= 70 ? 'Immediate intervention needed. Schedule wellness check-in and consider workload redistribution.' 
                        : emp.burnoutScore >= 40 ? 'Monitor closely. Provide support resources and schedule regular check-ins.' 
                        : 'Great wellness metrics! Employee is maintaining healthy work-life balance. Continue recognition program.'}
                    </p>
                </div>
            `;

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('employee-modal').classList.add('hidden');
        }

        function setupFilters() {
            document.getElementById('filter-all').addEventListener('click', function() {
                setActiveFilter(this, 'all');
            });
            document.getElementById('filter-critical').addEventListener('click', function() {
                setActiveFilter(this, 'critical');
            });
            document.getElementById('filter-healthy').addEventListener('click', function() {
                setActiveFilter(this, 'healthy');
            });
        }

        function setActiveFilter(btn, filter) {
            ['filter-all', 'filter-critical', 'filter-healthy'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('bg-violet-500/20', 'text-violet-300');
                el.classList.add('bg-slate-700/50', 'text-slate-400');
            });
            btn.classList.remove('bg-slate-700/50', 'text-slate-400');
            btn.classList.add('bg-violet-500/20', 'text-violet-300');
            currentFilter = filter;
            renderEmployeeTable(filter);
        }

        function init() {
            const now = new Date();
            document.getElementById('current-date').textContent = now.toLocaleDateString('en-US', {
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            renderStats();
            renderEmployeeTable();
            renderHealthyEmployees();
            renderAlerts();
            setupFilters();
        }

        async function onConfigChange(config) {
            document.getElementById('company-name').textContent = config.company_name || defaultConfig.company_name;
            document.getElementById('dashboard-title').textContent = config.dashboard_title || defaultConfig.dashboard_title;
        }

        function mapToCapabilities(config) {
            return {
                recolorables: [],
                borderables: [],
                fontEditable: undefined,
                fontSizeable: undefined
            };
        }

        function mapToEditPanelValues(config) {
            return new Map([
                ['company_name', config.company_name || defaultConfig.company_name],
                ['dashboard_title', config.dashboard_title || defaultConfig.dashboard_title]
            ]);
        }

        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                onConfigChange,
                mapToCapabilities,
                mapToEditPanelValues
            });
        }

        init();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
